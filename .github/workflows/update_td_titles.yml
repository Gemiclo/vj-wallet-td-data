name: Update Tesouro Direto Titles

on:
  schedule:
    - cron: '0 13 * * 1-5'  # 10:00 BRT (UTC-3), segunda a sexta
  workflow_dispatch:          # permite disparo manual

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Chromium for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Fetch and generate titulos_td.json
        run: node fetch_td_titles.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f titulos_td.json ]; then
            git add titulos_td.json
            if ! git diff --cached --quiet; then
              git commit -m "chore: atualiza titulos TD $(date -u '+%Y-%m-%d')"
              git push
            else
              echo "Sem alteracoes."
            fi
          else
            echo "titulos_td.json nao foi gerado - CSV indisponivel."
          fi
