name: Update Tesouro Direto Titles

on:
  schedule:
    - cron: '0 13 * * 1-5'  # 10:00 BRT (UTC-3), segunda a sexta
  workflow_dispatch:          # permite disparo manual

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and generate titulos_td.json
        run: python fetch_td_titles.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f titulos_td.json ]; then
            git add titulos_td.json
            if ! git diff --cached --quiet; then
              git commit -m "chore: atualiza títulos TD $(date -u '+%Y-%m-%d')"
              git push
            else
              echo "Sem alterações."
            fi
          else
            echo "titulos_td.json não foi gerado — CSV indisponível."
          fi
